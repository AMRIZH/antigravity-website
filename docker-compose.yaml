version: '3.8'

services:
  app:
    build: .
    container_name: antigravity_reciterecipe_app
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/reciterecipe?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/usr/src/app/public/uploads

  db:
    image: postgres:15
    container_name: antigravity_reciterecipe_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reciterecipe
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d reciterecipe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
